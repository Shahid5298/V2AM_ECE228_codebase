# LoRA Training Configuration for I2V on LIBERO Dataset

# Model paths
model:
  base_config: ../configs/inference_i2v_512_v2.0_distil.yaml
  checkpoint: ../hum_infer/checkpoints/stage_1.ckpt
  unet_path: ../hum_infer/checkpoints/unet.pt
  img_proj_path: ../hum_infer/checkpoints/img_proj.pt
  output_dir: ./checkpoints_mimicgen_t10

# Dataset — switch between LIBERO and MimicGen by changing cache_dir + paths
# After running prepare_video_model_dataset.py, just point cache_dir to the output.
dataset:
  name: "mimicgen"

  ## --- MimicGen (generated by prepare_video_model_dataset.py) ---
  cache_dir: ~/mimicgen_training_data_250
  data_path: data
  meta_path: meta

  ## --- LIBERO (uncomment to use original LIBERO data) ---
  # cache_dir: ~/.cache/huggingface/hub/datasets--physical-intelligence--libero
  # data_path: snapshots/a4336d589d589045d1c56423ffdf3b88a0e19b1f/data
  # meta_path: snapshots/a4336d589d589045d1c56423ffdf3b88a0e19b1f/meta

  # Video settings (optimized for 16GB VRAM)
  video_length: 8         # Number of frames per clip
  frame_stride: 2          # Sample every N frames
  resolution: [256, 256]   # H x W

# LoRA Configuration
lora:
  enabled: true
  r: 8                     # LoRA rank
  lora_alpha: 32           # LoRA scaling factor
  lora_dropout: 0.05       # Dropout for LoRA layers
  bias: "none"
  target_modules:
    - "to_q"
    - "to_k"
    - "to_v"
    - "to_out.0"

# Training
training:
  batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-4
  weight_decay: 0.01
  max_epochs: 50
  max_steps: -1
  warmup_steps: 100
  save_steps: 500
  logging_steps: 10
  optimizer: "adamw"
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  lr_scheduler: "cosine"
  fp16: true
  max_grad_norm: 1.0

# Frozen components
freeze:
  vae: true
  text_encoder: true
  image_embedder: true
  image_proj: true

# Logging
logging:
  project_name: "i2v-lora-mimicgen-stack"
  log_dir: ./logs
  use_wandb: true

seed: 42
